site_name: sqlearn
site_description: Compile ML preprocessing pipelines to SQL
site_url: https://tomosius.github.io/sqlearn
repo_url: https://github.com/Tomosius/sqlearn
repo_name: Tomosius/sqlearn
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true

plugins:
  - search
  - section-index
  - exclude:
      glob:
        - "0[0-9]-*.md"
        - "1[0-6]-*.md"
        - "superpowers/**"
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            docstring_style: google
            docstring_section_style: spacy
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            show_if_no_docstring: false

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - api/index.md
      - Core:
          - Pipeline: api/pipeline.md
          - Transformer: api/transformer.md
          - Schema: api/schema.md
          - Compiler: api/compiler.md
          - Backend: api/backend.md
          - IO: api/io.md
          - Errors: api/errors.md
      - Custom Transformers: api/custom.md
      - Transformers:
          - Imputer: api/imputer.md
          - StandardScaler: api/standard-scaler.md
          - MinMaxScaler: api/minmax-scaler.md
          - RobustScaler: api/robust-scaler.md
          - MaxAbsScaler: api/maxabs-scaler.md
          - Normalizer: api/normalizer.md
          - OneHotEncoder: api/onehot-encoder.md
          - OrdinalEncoder: api/ordinal-encoder.md
          - HashEncoder: api/hash-encoder.md
          - FrequencyEncoder: api/frequency-encoder.md
      - Data Operations:
          - Rename: api/rename.md
          - Cast: api/cast.md
          - Filter: api/filter.md
          - Sample: api/sample.md
          - Deduplicate: api/deduplicate.md
