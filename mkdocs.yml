site_name: sqlearn
site_description: Compile ML preprocessing pipelines to SQL
site_url: https://tomosius.github.io/sqlearn
repo_url: https://github.com/Tomosius/sqlearn
repo_name: Tomosius/sqlearn

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            docstring_style: google
            docstring_section_style: spacy
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - api/index.md
      - Core:
          - Pipeline: api/pipeline.md
          - Transformer: api/transformer.md
          - Schema: api/schema.md
          - Compiler: api/compiler.md
          - Backend: api/backend.md
          - IO: api/io.md
          - Errors: api/errors.md
      - Custom Transformers: api/custom.md
      - Transformers:
          - Imputer: api/imputer.md
          - StandardScaler: api/standard-scaler.md
          - OneHotEncoder: api/onehot-encoder.md
